version: "3.9"

services:
  web:
    build: .
    container_name: taskmaster_web
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_NAME: todoapp
      # Must match the password in secrets/db_password.txt (used by MySQL and pymysql).
      DB_PASSWORD: mypassword123

  db:
    image: mysql:5.7
    container_name: taskmaster_db
    restart: always
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: todoapp
    secrets:
      - db_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt