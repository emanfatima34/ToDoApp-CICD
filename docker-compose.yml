version: "3.9"

services:
  web:
    build: .
    container_name: my_web_app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_NAME: todoapp
    secrets:
      - db_password

  db:
    image: mysql:5.7
    container_name: my_db
    restart: always
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: todoapp
    secrets:
      - db_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:

secrets:
  db_password:
    file: ./db_password.txt